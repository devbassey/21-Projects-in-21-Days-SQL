<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21 SQL Projects in 21 Days</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #a259ff;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --easy: #00c896;
    --medium: #ffb800;
    --hard: #ff4757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-tag::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 96px);
    line-height: 0.95;
    letter-spacing: 2px;
    color: #fff;
  }
  h1 span {
    color: var(--accent);
  }

  .header-sub {
    font-size: 15px;
    color: var(--muted);
    margin-top: 16px;
    max-width: 560px;
    line-height: 1.6;
  }

  .stats-row {
    display: flex;
    gap: 32px;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-right: 4px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .badge-easy { background: rgba(0,200,150,0.12); color: var(--easy); border: 1px solid rgba(0,200,150,0.3); }
  .badge-medium { background: rgba(255,184,0,0.12); color: var(--medium); border: 1px solid rgba(255,184,0,0.3); }
  .badge-hard { background: rgba(255,71,87,0.12); color: var(--hard); border: 1px solid rgba(255,71,87,0.3); }
  .badge::before {
    content: '●';
    font-size: 8px;
  }

  /* PROJECT CARDS */
  .projects-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    padding: 28px 32px;
    transition: border-color 0.2s, background 0.2s;
    cursor: default;
    animation: fadeIn 0.4s ease both;
  }
  .project-card:hover {
    background: #1c1c28;
  }
  .project-card.easy { border-left-color: var(--easy); }
  .project-card.medium { border-left-color: var(--medium); }
  .project-card.hard { border-left-color: var(--hard); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .day-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .project-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
  }

  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
  }

  .tag {
    padding: 3px 9px;
    background: rgba(162,89,255,0.1);
    border: 1px solid rgba(162,89,255,0.25);
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--accent3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .project-desc {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 18px;
    max-width: 820px;
  }

  .project-meta {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }

  .meta-block {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    padding: 12px 14px;
    border-radius: 2px;
  }

  .meta-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .meta-content {
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.5;
  }

  .meta-content ul {
    padding-left: 14px;
  }
  .meta-content li {
    margin-bottom: 2px;
    color: var(--muted);
    font-size: 12px;
  }

  /* SQL block */
  .sql-block {
    background: #0d0d15;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px 18px;
    margin-bottom: 14px;
    overflow-x: auto;
  }
  .sql-block-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  pre {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    line-height: 1.7;
    color: #c8d0e0;
    white-space: pre;
  }
  .kw { color: #00e5ff; font-weight: 600; }
  .fn { color: #ff6b35; }
  .str { color: #a8ff78; }
  .cm { color: #4a5568; font-style: italic; }
  .num { color: #ffb800; }

  /* Dataset link */
  .dataset-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border: 1px solid rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.06);
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  .dataset-link:hover {
    background: rgba(0,229,255,0.14);
  }
  .dataset-link::before { content: '⬡'; font-size: 12px; }

  /* Expand toggle */
  .expand-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 0;
    transition: color 0.2s;
    margin-top: 6px;
  }
  .expand-btn:hover { color: var(--accent); }
  .expand-btn .arrow { transition: transform 0.25s; display: inline-block; }
  .expand-btn.open .arrow { transform: rotate(90deg); }

  .expandable {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .expandable.open {
    max-height: 2000px;
  }

  /* Footer */
  footer {
    margin-top: 80px;
    padding: 40px 0;
    border-top: 1px solid var(--border);
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .project-card { padding: 20px 18px; }
    .project-meta { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-tag">Data Analytics Challenge</div>
    <h1>21 SQL PROJECTS<br><span>IN 21 DAYS</span></h1>
    <p class="header-sub">Real-world datasets. Practical SQL skills. From beginner queries to advanced analytics — one project per day.</p>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">21</div><div class="stat-label">Projects</div></div>
      <div class="stat"><div class="stat-num">7</div><div class="stat-label">Easy</div></div>
      <div class="stat"><div class="stat-num">8</div><div class="stat-label">Medium</div></div>
      <div class="stat"><div class="stat-num">6</div><div class="stat-label">Hard</div></div>
    </div>
  </header>

  <div class="legend">
    <span class="legend-label">Difficulty:</span>
    <span class="badge badge-easy">Easy</span>
    <span class="badge badge-medium">Medium</span>
    <span class="badge badge-hard">Hard</span>
  </div>

  <div class="projects-grid" id="projects"></div>

  <footer>
    Generated for Utibe · SQL Data Analytics Roadmap · 2025
  </footer>
</div>

<script>
const projects = [
  {
    day: 1,
    title: "Exploring NYC Restaurant Inspections",
    difficulty: "easy",
    tags: ["SELECT", "WHERE", "ORDER BY"],
    domain: "Public Health",
    description: "Dive into New York City's restaurant inspection database. Write basic SELECT queries to find health violations, filter by grade, and sort by inspection date. Your first real-world data exploration.",
    dataset: "NYC Open Data – DOHMH Restaurant Inspections",
    datasetUrl: "https://data.cityofnewyork.us/Health/DOHMH-New-York-City-Restaurant-Inspection-Results/43nn-pn8j",
    objectives: ["Load and preview the dataset", "Filter restaurants by grade (A, B, C)", "Find all violations in a specific borough", "Sort by most recent inspection"],
    keyConcepts: ["SELECT * vs SELECT columns", "WHERE with AND/OR", "ORDER BY ASC/DESC", "LIMIT"],
    tools: "SQLite / DB Browser for SQLite (free)",
    estimatedTime: "2–3 hours",
    sql: `<span class="cm">-- Find all Grade-C restaurants in Manhattan</span>
<span class="kw">SELECT</span> dba, boro, cuisine_description, grade, inspection_date
<span class="kw">FROM</span> restaurant_inspections
<span class="kw">WHERE</span> grade = <span class="str">'C'</span>
  <span class="kw">AND</span> boro = <span class="str">'MANHATTAN'</span>
<span class="kw">ORDER BY</span> inspection_date <span class="kw">DESC</span>
<span class="kw">LIMIT</span> <span class="num">20</span>;`
  },
  {
    day: 2,
    title: "COVID-19 Global Case Trends",
    difficulty: "easy",
    tags: ["GROUP BY", "COUNT", "SUM"],
    domain: "Epidemiology",
    description: "Aggregate global COVID-19 data to track case counts and deaths by country. Practice GROUP BY and aggregate functions on one of the most important public datasets of our time.",
    dataset: "Our World in Data – COVID-19 Dataset",
    datasetUrl: "https://github.com/owid/covid-19-data/tree/master/public/data",
    objectives: ["Count total cases per country", "Sum deaths by continent", "Find top 10 countries by case count", "Calculate average daily new cases"],
    keyConcepts: ["GROUP BY + aggregate functions", "COUNT(), SUM(), AVG()", "ORDER BY with aggregate", "HAVING vs WHERE"],
    tools: "PostgreSQL / DBeaver",
    estimatedTime: "2–3 hours",
    sql: `<span class="cm">-- Top 10 countries by total reported deaths</span>
<span class="kw">SELECT</span> location, <span class="fn">MAX</span>(total_deaths) <span class="kw">AS</span> peak_deaths
<span class="kw">FROM</span> covid_data
<span class="kw">WHERE</span> continent <span class="kw">IS NOT NULL</span>
<span class="kw">GROUP BY</span> location
<span class="kw">ORDER BY</span> peak_deaths <span class="kw">DESC</span>
<span class="kw">LIMIT</span> <span class="num">10</span>;`
  },
  {
    day: 3,
    title: "E-Commerce Sales Performance",
    difficulty: "easy",
    tags: ["JOIN", "SUM", "GROUP BY"],
    domain: "Retail Analytics",
    description: "Join orders, customers, and products tables from a sample e-commerce store. Calculate revenue by product category and find your best customers.",
    dataset: "Kaggle – Brazilian E-Commerce (Olist)",
    datasetUrl: "https://www.kaggle.com/datasets/olistbr/brazilian-ecommerce",
    objectives: ["Join orders with order_items and products", "Calculate total revenue per category", "Find top 10 customers by spend", "Monthly revenue trend"],
    keyConcepts: ["INNER JOIN across 3 tables", "SUM() with GROUP BY", "Table aliases", "Multi-column SELECT"],
    tools: "SQLite / DuckDB",
    estimatedTime: "3–4 hours",
    sql: `<span class="cm">-- Revenue by product category</span>
<span class="kw">SELECT</span> p.product_category_name,
       <span class="fn">ROUND</span>(<span class="fn">SUM</span>(oi.price), <span class="num">2</span>) <span class="kw">AS</span> total_revenue,
       <span class="fn">COUNT</span>(<span class="kw">DISTINCT</span> o.order_id) <span class="kw">AS</span> num_orders
<span class="kw">FROM</span> orders o
<span class="kw">JOIN</span> order_items oi <span class="kw">ON</span> o.order_id = oi.order_id
<span class="kw">JOIN</span> products p <span class="kw">ON</span> oi.product_id = p.product_id
<span class="kw">GROUP BY</span> p.product_category_name
<span class="kw">ORDER BY</span> total_revenue <span class="kw">DESC</span>;`
  },
  {
    day: 4,
    title: "Spotify Top Tracks Analysis",
    difficulty: "easy",
    tags: ["AVG", "MIN", "MAX", "GROUP BY"],
    domain: "Music / Entertainment",
    description: "Analyze Spotify's audio features dataset — danceability, energy, tempo, valence — across genres and years. Find what makes a hit song.",
    dataset: "Kaggle – Spotify Tracks DB",
    datasetUrl: "https://www.kaggle.com/datasets/maharshipandya/-spotify-tracks-dataset",
    objectives: ["Average danceability per genre", "Find highest energy tracks", "Correlation proxy between tempo and popularity", "Top 5 artists by average popularity"],
    keyConcepts: ["AVG(), MIN(), MAX()", "Filtering with numeric ranges", "GROUP BY + HAVING", "Sorting multiple columns"],
    tools: "SQLite",
    estimatedTime: "2–3 hours",
    sql: `<span class="cm">-- Avg audio features per genre (top 10 by popularity)</span>
<span class="kw">SELECT</span> track_genre,
       <span class="fn">ROUND</span>(<span class="fn">AVG</span>(popularity), <span class="num">1</span>) <span class="kw">AS</span> avg_popularity,
       <span class="fn">ROUND</span>(<span class="fn">AVG</span>(danceability), <span class="num">3</span>) <span class="kw">AS</span> avg_dance,
       <span class="fn">ROUND</span>(<span class="fn">AVG</span>(energy), <span class="num">3</span>) <span class="kw">AS</span> avg_energy
<span class="kw">FROM</span> spotify_tracks
<span class="kw">GROUP BY</span> track_genre
<span class="kw">HAVING</span> <span class="fn">COUNT</span>(*) > <span class="num">50</span>
<span class="kw">ORDER BY</span> avg_popularity <span class="kw">DESC</span>
<span class="kw">LIMIT</span> <span class="num">10</span>;`
  },
  {
    day: 5,
    title: "World University Rankings",
    difficulty: "easy",
    tags: ["RANK", "CASE WHEN", "GROUP BY"],
    domain: "Education",
    description: "Query the QS World University Rankings dataset. Compare universities by country, assign tiers using CASE WHEN, and rank institutions within regions.",
    dataset: "Kaggle – QS World University Rankings 2025",
    datasetUrl: "https://www.kaggle.com/datasets/darrylljk/worlds-best-universities-qs-rankings-2025",
    objectives: ["Count universities per country", "Assign Top 100 / Top 500 / Rest tier labels", "Average score per region", "Rank universities within each country"],
    keyConcepts: ["CASE WHEN / THEN / ELSE", "Window function RANK() OVER", "GROUP BY with HAVING", "String functions"],
    tools: "PostgreSQL / SQLite",
    estimatedTime: "2–3 hours",
    sql: `<span class="cm">-- Tier classification for universities</span>
<span class="kw">SELECT</span> university_name, country, rank_2025,
  <span class="kw">CASE</span>
    <span class="kw">WHEN</span> rank_2025 <= <span class="num">100</span>  <span class="kw">THEN</span> <span class="str">'Elite'</span>
    <span class="kw">WHEN</span> rank_2025 <= <span class="num">500</span>  <span class="kw">THEN</span> <span class="str">'Top Tier'</span>
    <span class="kw">ELSE</span> <span class="str">'Emerging'</span>
  <span class="kw">END</span> <span class="kw">AS</span> tier
<span class="kw">FROM</span> qs_rankings
<span class="kw">ORDER BY</span> rank_2025;`
  },
  {
    day: 6,
    title: "Airbnb Listings in NYC",
    difficulty: "easy",
    tags: ["AVG", "WHERE", "GROUP BY"],
    domain: "Real Estate / Tourism",
    description: "Explore 50,000+ Airbnb listings in New York City. Analyze price distributions by neighborhood, room type availability, and host performance metrics.",
    dataset: "Inside Airbnb – NYC Open Data",
    datasetUrl: "http://insideairbnb.com/get-the-data/",
    objectives: ["Average price by neighbourhood group", "Count listings by room type", "Find superhosts with highest review scores", "Price range distribution using CASE"],
    keyConcepts: ["AVG() with GROUP BY", "CASE WHEN for buckets", "COUNT with DISTINCT", "NULL handling with COALESCE"],
    tools: "SQLite / DuckDB",
    estimatedTime: "2–3 hours",
    sql: `<span class="cm">-- Average nightly price per neighbourhood group</span>
<span class="kw">SELECT</span> neighbourhood_group,
       <span class="fn">ROUND</span>(<span class="fn">AVG</span>(price), <span class="num">2</span>) <span class="kw">AS</span> avg_price,
       <span class="fn">COUNT</span>(*) <span class="kw">AS</span> total_listings,
       <span class="fn">MIN</span>(price) <span class="kw">AS</span> min_price,
       <span class="fn">MAX</span>(price) <span class="kw">AS</span> max_price
<span class="kw">FROM</span> listings
<span class="kw">WHERE</span> price > <span class="num">0</span> <span class="kw">AND</span> price < <span class="num">1000</span>
<span class="kw">GROUP BY</span> neighbourhood_group
<span class="kw">ORDER BY</span> avg_price <span class="kw">DESC</span>;`
  },
  {
    day: 7,
    title: "Student Performance Analysis",
    difficulty: "easy",
    tags: ["AVG", "CASE WHEN", "GROUP BY"],
    domain: "Education",
    description: "Analyze student exam scores across math, reading, and writing. Group by gender, parental education, and test prep to uncover performance patterns — directly relevant to school data work.",
    dataset: "Kaggle – Students Performance in Exams",
    datasetUrl: "https://www.kaggle.com/datasets/spscientist/students-performance-in-exams",
    objectives: ["Average scores by gender", "Impact of test prep course on scores", "Pass/fail classification using CASE", "Top performers across all three subjects"],
    keyConcepts: ["CASE WHEN for grading", "Compound GROUP BY", "Multiple AVG() in one query", "WHERE with multiple conditions"],
    tools: "SQLite",
    estimatedTime: "2 hours",
    sql: `<span class="cm">-- Effect of test prep on average scores</span>
<span class="kw">SELECT</span> test_preparation_course,
       <span class="fn">ROUND</span>(<span class="fn">AVG</span>(math_score), <span class="num">1</span>)    <span class="kw">AS</span> avg_math,
       <span class="fn">ROUND</span>(<span class="fn">AVG</span>(reading_score), <span class="num">1</span>) <span class="kw">AS</span> avg_reading,
       <span class="fn">ROUND</span>(<span class="fn">AVG</span>(writing_score), <span class="num">1</span>) <span class="kw">AS</span> avg_writing
<span class="kw">FROM</span> students
<span class="kw">GROUP BY</span> test_preparation_course;`
  },
  {
    day: 8,
    title: "Global Netflix Content Library",
    difficulty: "medium",
    tags: ["SUBSTR", "COUNT", "WINDOW FUNCTIONS"],
    domain: "Media / Streaming",
    description: "Query Netflix's catalog of 8,000+ titles. Extract release year from dates, analyze content by country and genre, and track how the library has grown year over year.",
    dataset: "Kaggle – Netflix Movies and TV Shows",
    datasetUrl: "https://www.kaggle.com/datasets/shivamb/netflix-shows",
    objectives: ["Content added per year trend", "Top 10 countries by content count", "Ratio of Movies vs TV Shows per year", "Average movie duration by genre"],
    keyConcepts: ["String functions: SUBSTR, LENGTH", "Date extraction: STRFTIME / EXTRACT", "CASE WHEN in SELECT", "Subqueries"],
    tools: "SQLite / PostgreSQL",
    estimatedTime: "3–4 hours",
    sql: `<span class="cm">-- Content added per year, by type</span>
<span class="kw">SELECT</span>
  <span class="fn">SUBSTR</span>(date_added, -4) <span class="kw">AS</span> year_added,
  type,
  <span class="fn">COUNT</span>(*) <span class="kw">AS</span> titles_added
<span class="kw">FROM</span> netflix_titles
<span class="kw">WHERE</span> date_added <span class="kw">IS NOT NULL</span>
<span class="kw">GROUP BY</span> year_added, type
<span class="kw">ORDER BY</span> year_added <span class="kw">DESC</span>;`
  },
  {
    day: 9,
    title: "US Flight Delays & Cancellations",
    difficulty: "medium",
    tags: ["SUBQUERY", "HAVING", "AVG"],
    domain: "Transportation",
    description: "Investigate Bureau of Transportation Statistics flight data. Find which airlines and airports have the worst delay records, and calculate average delay times using subqueries.",
    dataset: "Kaggle – 2015 Flight Delays and Cancellations",
    datasetUrl: "https://www.kaggle.com/datasets/usdot/flight-delays",
    objectives: ["Average departure delay per airline", "Airports with >30% cancellation rate", "Worst routes by average delay", "Subquery to compare airline vs overall average"],

  <span class="kw">FROM</span> sales_order_header soh
  <span class="kw">GROUP BY</span> <span class="num">1</span>
)
<span class="kw">SELECT</span> *,
  <span class="fn">ROUND</span>(revenue / <span class="fn">NULLIF</span>(orders, <span class="num">0</span>), <span class="num">2</span>) <span class="kw">AS</span> aov,
  <span class="fn">LAG</span>(revenue) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month) <span class="kw">AS</span> prev_month_revenue,
  <span class="fn">ROUND</span>(
    <span class="num">100.0</span> * (revenue - <span class="fn">LAG</span>(revenue) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month))
    / <span class="fn">NULLIF</span>(<span class="fn">LAG</span>(revenue) <span class="kw">OVER</span> (<span class="kw">ORDER BY</span> month), <span class="num">0</span>)
  , <span class="num">1</span>) <span class="kw">AS</span> mom_growth_pct
<span class="kw">FROM</span> monthly;`
  }
];

function renderProjects() {
  const grid = document.getElementById('projects');
  projects.forEach((p, i) => {
    const delay = (i * 30) + 'ms';
    const card = document.createElement('div');
    card.className = `project-card ${p.difficulty}`;
    card.style.animationDelay = delay;

    const diffBadge = `<span class="badge badge-${p.difficulty}">${p.difficulty}</span>`;
    const tagHtml = p.tags.map(t => `<span class="tag">${t}</span>`).join('');

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="day-num">Day ${String(p.day).padStart(2,'0')} / 21</div>
          <div class="project-title">${p.title}</div>
        </div>
        <div class="tags">
          ${diffBadge}
          ${tagHtml}
        </div>
      </div>

      <p class="project-desc">${p.description}</p>

      <div class="project-meta">
        <div class="meta-block">
          <div class="meta-title">📁 Dataset</div>
          <div class="meta-content">${p.dataset}</div>
        </div>
        <div class="meta-block">
          <div class="meta-title">🛠 Tools</div>
          <div class="meta-content">${p.tools}</div>
        </div>
        <div class="meta-block">
          <div class="meta-title">⏱ Est. Time</div>
          <div class="meta-content">${p.estimatedTime}</div>
        </div>
        <div class="meta-block">
          <div class="meta-title">🎯 Objectives</div>
          <div class="meta-content">
            <ul>${p.objectives.map(o => `<li>${o}</li>`).join('')}</ul>
          </div>
        </div>
        <div class="meta-block">
          <div class="meta-title">📚 Key Concepts</div>
          <div class="meta-content">
            <ul>${p.keyConcepts.map(c => `<li>${c}</li>`).join('')}</ul>
          </div>
        </div>
      </div>

      <a href="${p.datasetUrl}" target="_blank" class="dataset-link">Get Dataset →</a>

      <button class="expand-btn" onclick="toggleSql(this)">
        <span class="arrow">▶</span> Show Sample SQL
      </button>
      <div class="expandable">
        <div class="sql-block">
          <div class="sql-block-label">Sample Query</div>
          <pre>${p.sql}</pre>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleSql(btn) {
  btn.classList.toggle('open');
  const exp = btn.nextElementSibling;
  exp.classList.toggle('open');
}

renderProjects();
</script>
</body>
</html>
